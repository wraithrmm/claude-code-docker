  # glob CLI command injection - FALSE POSITIVE for npm
  # npm uses glob as a library, not CLI. The vulnerable -c/--cmd code path is never executed.
  # See: https://github.com/npm/cli/issues/8741
  - id: CVE-2025-64756
    statement: FALSE POSITIVE - npm uses glob library interface, not CLI. Vulnerable code path never executed.

